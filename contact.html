<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ติดต่อแอดมิน - Prime Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: #e5e7eb;
      text-align: center;
      padding: 20px;

      opacity: 0;
      transform: translateY(20px);
      transition: 0.5s ease;
    }

    body.show {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      margin-top: 30px;
      font-size: 22px;
    }

    .box {
      margin-top: 30px;
      background: #020617;
      border: 1px solid #1f2937;
      padding: 20px;
      border-radius: 12px;

      transform: scale(0.9);
      opacity: 0;
      transition: 0.4s;
    }

    .box.show {
      transform: scale(1);
      opacity: 1;
    }

    .contact-btn {
      display: block;
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .line {
      background: #22c55e;
      color: black;
    }

    .facebook {
      background: #3b82f6;
      color: white;
    }

    .phone {
      background: #38bdf8;
      color: black;
    }

    .contact-btn:active {
      transform: scale(0.95);
    }

    .back {
      display: inline-block;
      margin-top: 25px;
      color: #38bdf8;
      text-decoration: none;
      font-size: 14px;
    }

    .time {
      margin-top: 15px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<h2>📞 ติดต่อแอดมิน</h2>

<div class="box" id="box">

  <a href="https://line.me/ti/p/~yourlineid" class="contact-btn line">
    💬 ติดต่อผ่าน LINE
  </a>

  <a href="https://facebook.com/yourpage" class="contact-btn facebook">
    📘 ติดต่อผ่าน Facebook
  </a>

  <a href="tel:0000000000" class="contact-btn phone">
    📱 โทร: 000-000-0000
  </a>

  <div class="time">
    🕒 เวลาทำการ: 10:00 - 22:00 น. (ทุกวัน)
  </div>

</div>

<a href="home.html" class="back">⬅ กลับหน้าหลัก</a>

<script>
  // 🔥 เอฟเฟคตอนเปิดหน้า
  window.onload = () => {
    document.body.classList.add("show");

    setTimeout(() => {
      document.getElementById("box").classList.add("show");
    }, 200);
  };
</script>

</body>
</html>
