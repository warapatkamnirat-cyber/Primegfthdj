<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIME STORE | ULTIMATE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #D4AF37; --gold-light: #F9F1CC; --gold-dark: #AA8C2C;
            --bg-dark: #0a0a0a; --bg-card: rgba(20, 20, 20, 0.6);
            --gold-gradient: linear-gradient(135deg, #D4AF37, #F9F1CC, #B38728, #FBF5B7, #AA771C);
        }

        body { font-family: 'Kanit', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; padding-bottom: 90px; }
        
        /* Glassmorphism & Premium Cards */
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .text-prime { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Bottom Navigation */
        nav.bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(212, 175, 55, 0.1); display: flex; z-index: 1000; padding: 15px 0 25px 0; }
        .nav-btn { flex: 1; text-align: center; color: #444; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; display: flex; flex-direction: column; items-center; justify-center; transform: scale(0.9); }
        .nav-btn.active { color: var(--gold-primary); transform: scale(1); text-shadow: 0 0 15px rgba(212,175,55,0.4); }

        /* Smooth Tab Transitions */
        .tab-view { display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease; }
        .tab-view.active { display: block; opacity: 1; transform: translateY(0); animation: slideUpFade 0.5s ease forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Input & Buttons */
        .prime-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; text-align: center; outline: none; transition: 0.3s; }
        .prime-input:focus { border-color: var(--gold-primary); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .btn-gold { background: var(--gold-gradient); color: #000; font-weight: 900; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-gold:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        /* Terminal Nav */
        .nav-card { filter: grayscale(100%); opacity: 0.5; transition: all 0.3s ease; border: 1px solid transparent; }
        .nav-card.active { filter: grayscale(0%); opacity: 1; border-color: var(--gold-primary); background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%); box-shadow: inset 0 2px 10px rgba(212,175,55,0.1); }

        /* Custom Modal System */
        #custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-box { transform: scale(0.9) translateY(20px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #custom-modal-overlay.show { display: flex; opacity: 1; }
        #custom-modal-overlay.show .modal-box { transform: scale(1) translateY(0); }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-col; gap: 10px; pointer-events: none; }
        .toast { background: rgba(15,15,15,0.95); border-left: 3px solid var(--gold-primary); padding: 12px 20px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; animation: toastEnter 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .toast.toast-error { border-left-color: #ef4444; }
        .toast.toast-success { border-left-color: #22c55e; }
        @keyframes toastEnter { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastExit { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onload="initApp()">

    <audio id="sfx-click" src="https://www.soundjay.com/buttons/button-50.mp3"></audio>
    <audio id="sfx-error" src="https://www.soundjay.com/buttons/button-10.mp3"></audio>
    <audio id="sfx-success" src="https://www.soundjay.com/buttons/button-09.mp3"></audio>
    <audio id="sfx-alert" src="https://www.soundjay.com/buttons/button-47.mp3"></audio>

    <div id="toast-container"></div>

    <div id="custom-modal-overlay">
        <div id="modal-content" class="modal-box glass-panel w-[90%] max-w-sm p-6 relative overflow-hidden">
            </div>
    </div>

    <header class="w-full max-w-md mx-auto flex justify-between items-center px-5 pt-6 pb-4">
        <div>
            <h1 class="text-[22px] font-black text-prime italic uppercase tracking-wider leading-none">Prime</h1>
            <div class="flex items-center gap-2 mt-1.5 bg-black/40 px-2 py-1 rounded border border-white/5 w-max">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                <p id="user-display" class="text-[9px] text-gray-400 font-mono uppercase tracking-wider">LOADING...</p>
                <button onclick="logout()" class="ml-2 text-[8px] text-red-500 font-bold hover:text-red-400 transition">LOGOUT</button>
            </div>
        </div>
        <div class="glass-panel px-4 py-2 text-right cursor-pointer hover:bg-white/5 transition" onclick="switchMainTab('topup')">
            <p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-0.5">Balance</p>
            <h2 id="current-balance" class="text-xl font-black text-white italic tracking-tighter">฿ 0.00</h2>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto px-4 mt-2">
        
        <section id="main-home" class="tab-view active">
            <div id="category-bar" class="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-2 px-1"></div>
            <div class="flex items-center gap-2 mb-4 pl-1">
                <div class="w-1 h-3 bg-gold-primary rounded-full"></div>
                <h3 class="text-xs font-black italic text-gray-300 uppercase tracking-widest">Premium Stock</h3>
            </div>
            <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="main-topup" class="tab-view">
            <div class="glass-panel p-5 mb-4 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gold-primary to-transparent opacity-50"></div>
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-[9px] text-gold-primary font-bold uppercase tracking-widest">Gateway</span>
                        <h2 class="text-2xl font-black text-white italic tracking-tighter leading-none mt-1">Terminal</h2>
                    </div>
                    <span class="text-[8px] text-gray-600 font-mono">SYS.V29</span>
                </div>
            </div>

            <nav class="grid grid-cols-3 gap-2 mb-4">
                <div onclick="changeTerminalSubTab('pp')" id="tab-pp" class="nav-card active glass-panel p-3 flex flex-col items-center justify-center gap-2 cursor-pointer rounded-2xl">
                    <img src="PromptPay.png" class="w-6 h-6 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/263/263115.png'">
                    <span class="text-[8px] font-bold uppercase tracking-wider text-gray-300">PromptPay</span>
                </div>
                <div onclick="changeTerminalSubTab('wallet')" id="tab-wallet" class="nav-card glass-panel p-3 flex flex-col items-center justify-center gap-2 cursor-pointer rounded-2xl">
                    <img src="Wallet.png" class="w-6 h-6 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10142/10142340.png'">
                    <span class="text-[8px] font-bold uppercase tracking-wider text-gray-300">Wallet</span>
                </div>
                <div onclick="changeTerminalSubTab('gift')" id="tab-gift" class="nav-card glass-panel p-3 flex flex-col items-center justify-center gap-2 cursor-pointer rounded-2xl">
                    <img src="Gift.png" class="w-6 h-6 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10042/10042078.png'">
                    <span class="text-[8px] font-bold uppercase tracking-wider text-gray-300">Gift Link</span>
                </div>
            </nav>

            <div class="glass-panel p-6 min-h-[420px]" id="terminal-screen">
                
                <div id="view-pp" class="terminal-sub-view space-y-6">
                    <div class="text-center bg-black/30 p-4 rounded-2xl border border-white/5 relative">
                        <div class="w-36 h-36 bg-white mx-auto rounded-2xl p-2 relative shadow-[0_0_30px_rgba(212,175,55,0.1)]">
                            <img src="Moops.jpg" class="w-full h-full object-contain" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg'">
                        </div>
                        <h3 class="text-[11px] font-bold text-gray-300 uppercase tracking-widest mt-4">วรภัทร แกมนิรัตน์</h3>
                        <p class="text-prime font-mono text-xl font-black mt-1">093-489-1050</p>
                    </div>
                    <div id="pp-preview-box" class="hidden rounded-xl overflow-hidden border border-gold-primary/30 relative">
                        <img id="pp-preview-img" class="w-full h-auto opacity-80">
                        <div class="absolute bottom-2 right-2 bg-black/80 px-2 py-1 rounded text-[8px] text-gold-primary font-bold">READY</div>
                    </div>
                    <div class="space-y-2">
                        <button onclick="document.getElementById('pp-file').click()" class="w-full py-4 prime-input rounded-xl text-[11px] flex justify-between px-6 items-center border-dashed">
                            <span id="pp-label" class="text-gray-500 italic">อัปโหลดสลิปการโอน...</span>
                            <span class="text-white font-bold text-[9px] bg-white/10 px-3 py-1 rounded uppercase">Browse</span>
                        </button>
                        <input type="file" id="pp-file" class="hidden" accept="image/*" onchange="handlePreview('pp')">
                        <button onclick="processSubmit('PromptPay', 'pp-file')" class="btn-gold w-full py-4 text-black font-black text-[11px] rounded-xl uppercase tracking-widest mt-2">ยืนยันทำรายการ</button>
                    </div>
                </div>

                <div id="view-wallet" class="terminal-sub-view hidden space-y-6 pt-6">
                    <div class="text-center bg-black/30 p-6 rounded-2xl border border-white/5">
                        <div class="w-16 h-16 bg-orange-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(234,88,12,0.3)]">
                            <img src="Wallet.png" class="w-8 h-8 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10142/10142340.png'">
                        </div>
                        <p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest">TrueMoney Wallet</p>
                        <h2 class="text-3xl font-black text-white italic mt-1">093-489-1050</h2>
                    </div>
                    <div id="tw-preview-box" class="hidden border border-orange-500/30 rounded-xl overflow-hidden relative"><img id="tw-preview-img" class="w-full h-auto opacity-80"></div>
                    <div class="space-y-2">
                        <button onclick="document.getElementById('tw-file').click()" class="w-full py-4 prime-input rounded-xl text-[11px] flex justify-between px-6 items-center border-dashed border-orange-500/30">
                            <span id="tw-label" class="text-gray-500 italic">อัปโหลดสลิปวอเล็ต...</span>
                            <span class="text-orange-400 font-bold text-[9px] bg-orange-500/10 px-3 py-1 rounded uppercase">Browse</span>
                        </button>
                        <input type="file" id="tw-file" class="hidden" accept="image/*" onchange="handlePreview('tw')">
                        <button onclick="processSubmit('Wallet', 'tw-file')" class="w-full py-4 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-black text-[11px] rounded-xl uppercase tracking-widest mt-2 active:scale-95 transition">ส่งข้อมูล</button>
                    </div>
                </div>

                <div id="view-gift" class="terminal-sub-view hidden text-center pt-10 space-y-6">
                    <div class="w-20 h-20 bg-red-900/30 border border-red-500/30 rounded-full mx-auto flex items-center justify-center mb-2 shadow-[0_0_30px_rgba(220,38,38,0.2)]">
                        <span class="text-4xl">🧧</span>
                    </div>
                    <div>
                        <h2 class="text-prime font-black text-xl italic uppercase tracking-widest">Red Envelope</h2>
                        <p class="text-[9px] text-gray-500 mt-1">วางลิงก์ซองของขวัญเพื่อเติมเครดิต</p>
                    </div>
                    <div class="space-y-3 px-2">
                        <input type="text" id="gift-url" placeholder="https://gift.truemoney.com/campaign/..." class="w-full p-4 prime-input rounded-xl text-[10px] focus:border-gold-primary">
                        <button onclick="processSubmit('Gift Link', 'gift-url')" class="btn-gold w-full py-4 rounded-xl text-black font-black text-[11px] uppercase tracking-widest">ยืนยันลิงก์</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="main-history" class="tab-view">
             <div class="flex items-center gap-2 mb-4 pl-1">
                <div class="w-1 h-3 bg-gold-primary rounded-full"></div>
                <h3 class="text-xs font-black italic text-gray-300 uppercase tracking-widest">Transaction Log</h3>
            </div>
             <div id="history-list" class="space-y-3"></div>
        </section>
    </main>

    <nav class="bottom-nav justify-around px-4">
        <div class="nav-btn active" id="btn-home" onclick="switchMainTab('home')">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[8px] font-bold uppercase tracking-wider">Store</span>
        </div>
        <div class="nav-btn" id="btn-topup" onclick="switchMainTab('topup')">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            <span class="text-[8px] font-bold uppercase tracking-wider">Terminal</span>
        </div>
        <div class="nav-btn" id="btn-history" onclick="switchMainTab('history')">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="text-[8px] font-bold uppercase tracking-wider">History</span>
        </div>
    </nav>
    <script>
        const DB_STOCK = 'b_v26_stock', DB_PENDING = 'b_v26_pending', DB_HISTORY = 'user_history', DB_BALANCE = 'user_balance';
        let balance = 0, stock = [], history = [];
        let currentUser = "";

        function playSound(id) { const s = document.getElementById(id); if(s) { s.currentTime = 0; s.play().catch(()=>{}); } }

        // --- 🚀 ระบบ CUSTOM UI MODAL & TOAST ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'success' ? '✅' : '⚠️';
            toast.innerHTML = `<span class="text-sm">${icon}</span> <span class="text-[10px] font-bold text-white tracking-wide">${message}</span>`;
            container.appendChild(toast);
            if(type==='error') playSound('sfx-error'); else if(type==='success') playSound('sfx-success');
            setTimeout(() => { toast.style.animation = 'toastExit 0.4s ease forwards'; setTimeout(() => toast.remove(), 400); }, 2500);
        }

        // Custom Confirm แบบ Async (ใช้แทน confirm() กากๆ)
        function UIConfirm(title, desc) {
            return new Promise((resolve) => {
                playSound('sfx-alert');
                const overlay = document.getElementById('custom-modal-overlay');
                const content = document.getElementById('modal-content');
                content.innerHTML = `
                    <div class="text-center mb-6">
                        <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-3 border border-white/10"><span class="text-xl">❓</span></div>
                        <h2 class="text-lg font-black text-white italic tracking-wide">${title}</h2>
                        <p class="text-[11px] text-gray-400 mt-2">${desc}</p>
                    </div>
                    <div class="flex gap-3">
                        <button id="btn-cancel" class="flex-1 py-3 bg-white/5 border border-white/10 text-gray-400 rounded-xl text-[10px] font-bold uppercase hover:bg-white/10 transition">ยกเลิก</button>
                        <button id="btn-confirm" class="flex-1 py-3 btn-gold rounded-xl text-[10px] uppercase">ยืนยัน</button>
                    </div>
                `;
                overlay.classList.add('show');
                
                document.getElementById('btn-confirm').onclick = () => { overlay.classList.remove('show'); resolve(true); };
                document.getElementById('btn-cancel').onclick = () => { overlay.classList.remove('show'); resolve(false); };
            });
        }

        // Custom Alert 
        function UIAlert(title, desc, icon = '⚠️') {
            return new Promise((resolve) => {
                playSound('sfx-alert');
                const overlay = document.getElementById('custom-modal-overlay');
                const content = document.getElementById('modal-content');
                content.innerHTML = `
                    <div class="text-center mb-6">
                        <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-3 border border-white/10"><span class="text-xl">${icon}</span></div>
                        <h2 class="text-lg font-black text-white italic tracking-wide">${title}</h2>
                        <p class="text-[11px] text-gray-400 mt-2">${desc}</p>
                    </div>
                    <button id="btn-ok" class="w-full py-3 bg-white/10 border border-white/20 text-white rounded-xl text-[10px] font-bold uppercase hover:bg-white/20 transition">เข้าใจแล้ว</button>
                `;
                overlay.classList.add('show');
                document.getElementById('btn-ok').onclick = () => { overlay.classList.remove('show'); resolve(); };
            });
        }

        // โชว์ใบเสร็จพรีเมียม
        function showPremiumReceipt(d) {
            playSound('sfx-success');
            const overlay = document.getElementById('custom-modal-overlay');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-gold-primary opacity-20 blur-3xl rounded-full"></div>
                <div class="text-center mb-5 border-b border-white/10 pb-4">
                    <span class="text-3xl mb-2 block">🎉</span>
                    <h2 class="text-xl font-black text-prime italic tracking-widest">SUCCESS</h2>
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest mt-1">Transaction Completed</p>
                </div>
                <div class="space-y-3 mb-5">
                    <div class="flex justify-between items-center text-[11px]"><span class="text-gray-500">ITEM</span><span class="font-bold text-white max-w-[150px] truncate">${d.name}</span></div>
                    <div class="flex justify-between items-center text-[11px]"><span class="text-gray-500">PRICE</span><span class="font-bold text-gold-primary">฿${d.price}</span></div>
                </div>
                <div class="bg-black/50 p-4 rounded-xl border border-white/5 mb-5 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full bg-gold-primary"></div>
                    <p class="text-[8px] text-gray-500 mb-2 font-bold tracking-widest">CREDENTIALS</p>
                    <p class="text-xs font-mono text-white mb-1 select-all">ID: <span class="font-bold">${d.user}</span></p>
                    <p class="text-xs font-mono text-white select-all">PW: <span class="font-bold">${d.pass}</span></p>
                </div>
                <button id="btn-close-receipt" class="w-full py-3 btn-gold rounded-xl text-[10px] font-bold uppercase tracking-widest">ดำเนินการต่อ</button>
            `;
            overlay.classList.add('show');
            document.getElementById('btn-close-receipt').onclick = () => overlay.classList.remove('show');
        }

        // --- 🔄 INITIALIZATION ---
        function initApp() {
            checkLogin(); loadData(); renderCategories(); renderStore(); syncProfile();
            setInterval(syncProfile, 3000);
            switchMainTab('home'); // ให้เริ่มที่ Store เพราะหน้าเว็บสวยขึ้นแล้ว
        }

        function checkLogin() {
            currentUser = localStorage.getItem('user_email');
            if(!currentUser) { window.location.href = 'login.html'; }
        }

        async function logout() {
            const confirmOut = await UIConfirm("ออกจากระบบ?", "คุณต้องการออกจากระบบและกลับไปหน้าล็อคอินใช่หรือไม่");
            if(confirmOut) { localStorage.removeItem('user_email'); window.location.href = 'login.html'; }
        }

        function loadData() {
            stock = JSON.parse(localStorage.getItem(DB_STOCK)) || [];
            history = JSON.parse(localStorage.getItem(DB_HISTORY)) || [];
        }

        function syncProfile() {
            balance = parseFloat(localStorage.getItem(DB_BALANCE)) || 0;
            currentUser = localStorage.getItem('user_email') || "ERROR";
            document.getElementById('current-balance').innerText = "฿ " + balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('user-display').innerText = currentUser;
        }

        function switchMainTab(tab) {
            playSound('sfx-click');
            document.querySelectorAll('.tab-view, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`main-${tab}`).classList.add('active');
            document.getElementById(`btn-${tab}`).classList.add('active');
            if(tab === 'history') renderHistory();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeTerminalSubTab(id) {
            playSound('sfx-click');
            document.querySelectorAll('.terminal-sub-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-card').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).classList.add('active');
        }

        // --- 🛒 STORE LOGIC ---
        function renderCategories() {
            const bar = document.getElementById('category-bar');
            const games = [...new Set(stock.map(s => s.game))];
            let html = `<button onclick="renderStore('ALL')" class="bg-gold-primary text-black px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-wider flex-shrink-0 active:scale-95 transition">ALL</button>`;
            games.forEach(g => { html += `<button onclick="renderStore('${g}')" class="bg-white/5 border border-white/10 text-gray-400 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-wider flex-shrink-0 active:scale-95 transition">${g}</button>`; });
            bar.innerHTML = html;
        }

        function renderStore(filter = 'ALL') {
            const grid = document.getElementById('product-grid');
            let items = filter === 'ALL' ? stock : stock.filter(s => s.game === filter);
            grid.innerHTML = items.map(s => `
                <div class="glass-panel p-2 flex flex-col relative group overflow-hidden">
                    <div class="relative rounded-xl overflow-hidden mb-3 aspect-video">
                        <img src="${s.img}" class="w-full h-full object-cover opacity-80 group-hover:scale-110 transition duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        <span class="absolute top-2 right-2 bg-black/60 backdrop-blur text-[7px] text-gold-primary border border-gold-primary/30 px-2 py-0.5 rounded uppercase tracking-widest font-bold">${s.game}</span>
                    </div>
                    <div class="flex-1 flex flex-col justify-between px-1">
                        <div>
                            <h4 class="text-[11px] font-bold text-white mb-1 leading-tight line-clamp-2">${s.name}</h4>
                            <span class="text-[9px] text-gray-500 bg-black/50 px-1.5 py-0.5 rounded border border-white/5">Stock: ${s.items.length}</span>
                        </div>
                        <div class="mt-3 flex items-center justify-between">
                            <span class="text-prime font-black text-sm tracking-tighter">฿${s.price}</span>
                            <button onclick="buyProduct(${s.id})" class="bg-white/10 hover:bg-gold-primary hover:text-black text-white text-[9px] font-bold px-3 py-1.5 rounded-lg transition active:scale-95">BUY</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="col-span-2 py-12 text-center text-[10px] text-gray-500 italic border border-dashed border-white/10 rounded-2xl">ไม่มีสินค้าในหมวดหมู่นี้</div>';
        }

        async function buyProduct(id) {
            const p = stock.find(s => s.id === id);
            if(p.items.length === 0) return showToast("สินค้าหมดชั่วคราว!", "error");
            
            if(balance < p.price) { 
                const goTopup = await UIConfirm("ยอดเงินไม่พอ", `คุณขาดเงินอีก ฿${(p.price - balance).toFixed(2)} ต้องการไปหน้าเติมเงินหรือไม่?`);
                if(goTopup) switchMainTab('topup'); 
                return; 
            }

            const isConfirm = await UIConfirm("ยืนยันสั่งซื้อ", `ชำระเงิน ฿${p.price} เพื่อรับ ${p.name} หรือไม่?`);
            if(isConfirm) {
                balance -= p.price; localStorage.setItem(DB_BALANCE, balance);
                let res = p.type === 'GACHA' ? doGacha(p.items) : p.items.shift();
                
                const receipt = { name: p.name, email: currentUser, user: res.u, pass: res.p, price: p.price, date: new Date().toLocaleString('th-TH') };
                history.unshift(receipt); 
                
                localStorage.setItem(DB_HISTORY, JSON.stringify(history));
                localStorage.setItem(DB_STOCK, JSON.stringify(stock)); 
                
                syncProfile(); renderStore(); showPremiumReceipt(receipt);
            }
        }

        function doGacha(it) { let t=it.reduce((s,i)=>s+Number(i.chance),0), r=Math.random()*t, c=0; for(let i=0;i<it.length;i++){ c+=Number(it[i].chance); if(r<c) return it[i]; } return it[0]; }

        // --- 💳 TERMINAL UPLOAD ---
        function handlePreview(type) {
            const input = document.getElementById(`${type}-file`), box = document.getElementById(`${type}-preview-box`), img = document.getElementById(`${type}-preview-img`), label = document.getElementById(`${type}-label`);
            if (input.files && input.files[0]) { 
                const r = new FileReader(); 
                r.onload = (e) => { 
                    img.src = e.target.result; box.classList.remove('hidden'); 
                    label.innerText="ไฟล์พร้อมส่งต่อ"; label.classList.add('text-gold-primary', 'font-bold'); label.classList.remove('text-gray-500', 'italic');
                }; 
                r.readAsDataURL(input.files[0]); 
            }
        }

        async function processSubmit(method, inputId) {
            const input = document.getElementById(inputId);
            if ((input.type === 'file' && !input.files[0]) || (input.type === 'text' && input.value.trim() === "")) { 
                input.parentElement.classList.add('error-shake');
                showToast("กรุณาแนบไฟล์หรือข้อมูลให้ครบถ้วน", "error");
                setTimeout(() => input.parentElement.classList.remove('error-shake'), 400); return; 
            }
            
            const isSend = await UIConfirm("ยืนยันการส่งข้อมูล", `ต้องการส่งข้อมูลการโอนเงินผ่าน ${method} ให้แอดมินตรวจสอบใช่ไหม?`);
            if(!isSend) return;

            const screen = document.getElementById('terminal-screen');
            screen.innerHTML = `<div class="flex flex-col items-center justify-center h-full min-h-[300px]"><div class="w-12 h-12 border-4 border-white/10 border-t-gold-primary rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(212,175,55,0.5)]"></div><p class="text-prime font-black uppercase tracking-widest text-[10px] animate-pulse">Transmitting Data...</p></div>`;
            
            const saveToAdmin = (slipData) => {
                const pending = JSON.parse(localStorage.getItem(DB_PENDING)) || [];
                pending.push({ id: 'TX' + Date.now().toString().slice(-6), email: currentUser, slip: slipData, method: method, status: "รอตรวจสอบ", date: new Date().toLocaleString('th-TH') });
                localStorage.setItem(DB_PENDING, JSON.stringify(pending));
                
                setTimeout(async () => { 
                    screen.innerHTML = `<div class="flex flex-col items-center justify-center h-full min-h-[300px]"><div class="w-16 h-16 bg-green-500/20 border border-green-500 rounded-full flex items-center justify-center mb-4"><span class="text-green-400 text-2xl">✔</span></div><h2 class="text-green-400 font-black text-xl italic tracking-widest">SUCCESS</h2><p class="text-[10px] text-gray-500 text-center uppercase tracking-wider mt-2">Data sent to admin server</p></div>`; 
                    showToast("ส่งข้อมูลสำเร็จ รอแอดมินตรวจสอบ", "success");
                    setTimeout(() => location.reload(), 2000);
                }, 1500);
            };

            if (input.type === 'file') { const r = new FileReader(); r.onload = (e) => saveToAdmin(e.target.result); r.readAsDataURL(input.files[0]); } else { saveToAdmin(input.value); }
        }

        // --- 📜 HISTORY RENDER ---
        function renderHistory() {
            const list = document.getElementById('history-list');
            const myHistory = history.filter(h => h.email === currentUser);
            
            list.innerHTML = myHistory.map(h => `
                <div class="glass-panel p-4 relative overflow-hidden group hover:border-gold-primary/50 transition">
                    <div class="absolute left-0 top-0 w-1 h-full bg-white/10 group-hover:bg-gold-primary transition"></div>
                    <div class="flex justify-between items-start mb-2 pl-2">
                        <div>
                            <span class="text-[11px] font-black text-white italic truncate pr-2 tracking-wide">${h.name}</span>
                            <div class="text-[8px] text-gray-500 mt-0.5">${h.date}</div>
                        </div>
                        <span class="text-[10px] font-bold text-green-400 bg-green-400/10 px-2 py-0.5 rounded border border-green-400/20">฿${h.price}</span>
                    </div>
                    <div class="bg-black/60 p-3 rounded-lg text-[10px] text-gray-300 font-mono shadow-inner border border-white/5 ml-2 relative">
                        <button onclick="navigator.clipboard.writeText('ID: ${h.user} | PW: ${h.pass}'); showToast('คัดลอกข้อมูลแล้ว', 'success');" class="absolute top-2 right-2 text-gray-500 hover:text-white transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                        <p class="mb-1">ID: <span class="text-white font-bold">${h.user}</span></p>
                        <p>PW: <span class="text-white font-bold">${h.pass}</span></p>
                    </div>
                </div>
            `).join('') || '<div class="py-16 text-center"><span class="text-4xl opacity-20 block mb-2">📜</span><p class="text-[10px] text-gray-500 uppercase tracking-widest">No Transaction History</p></div>';
        }
    </script>
</body>
</html>
