<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIME AUTHENTICATION SYSTEM v2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --deep-slate: #0f172a; --error: #ef4444; }
        body { 
            font-family: 'Kanit', sans-serif; background: #000; color: #fff; 
            min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }

        /* Ambient Background */
        .bg-layer { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #000 100%); z-index: -1; }
        .grid-overlay { position: fixed; inset: 0; background-image: radial-gradient(rgba(212,175,55,0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }

        /* Pro Vault Design */
        .vault-card { 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); 
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 48px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(212,175,55,0.03);
            position: relative; overflow: hidden; transform: translateY(0); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Scan & Glow Effect */
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(212,175,55,0.2); top: 0; left: 0; animation: scan 6s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: -10%; opacity: 0; } 50% { opacity: 1; } 100% { top: 110%; opacity: 0; } }

        /* Input & Buttons */
        .auth-node { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s; border-radius: 24px; position: relative;
        }
        .auth-node:hover { background: rgba(255,255,255,0.08); border-color: var(--gold); transform: translateY(-3px); }
        .auth-node:active { transform: scale(0.96); }

        /* Notification Modal */
        #notification-box { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            z-index: 10000; display: none; align-items: center; justify-content: center; 
        }
        .modal-inner { background: #0f172a; border: 1px solid var(--gold); border-radius: 35px; width: 90%; max-width: 320px; padding: 40px 20px; text-align: center; }
        
        /* Spinner */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.1); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>

    <div id="notification-box">
        <div class="modal-inner">
            <div id="modal-icon" class="mb-4 text-3xl"></div>
            <h3 id="modal-title" class="text-white font-black italic uppercase mb-2 tracking-tighter"></h3>
            <p id="modal-desc" class="text-slate-400 text-[10px] mb-8 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition">Acknowledge</button>
        </div>
    </div>

    <div class="max-w-md w-[90%] vault-card p-12 text-center">
        <div class="scanline"></div>
        
        <header class="mb-14">
            <div class="relative w-24 h-24 mx-auto mb-6">
                <div class="absolute inset-0 bg-gold-primary opacity-20 blur-2xl animate-pulse"></div>
                <img src="PrimeStore.png" alt="Logo" class="w-full h-full object-contain relative z-10 drop-shadow-[0_0_20px_rgba(212,175,55,0.4)]">
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter text-white uppercase">Prime Store</h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.6em] uppercase mt-2">Core Security Terminal</p>
        </header>

        <div id="btn-group" class="space-y-4">
            <button onclick="executeAuth('google')" class="auth-node w-full py-5 px-8 flex items-center justify-between group">
                <div class="flex items-center gap-5">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5 grayscale group-hover:grayscale-0 transition duration-500">
                    <div class="text-left">
                        <span class="block text-[8px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Primary Link</span>
                        <span class="block text-xs text-white font-black uppercase tracking-wider">Google Network</span>
                    </div>
                </div>
                <div class="w-6 h-6 rounded-full border border-white/5 flex items-center justify-center group-hover:border-gold transition">
                    <svg class="w-3 h-3 text-slate-600 group-hover:text-gold transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="4" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </button>

            <button onclick="executeAuth('facebook')" class="auth-node w-full py-5 px-8 flex items-center justify-between group">
                <div class="flex items-center gap-5">
                    <svg class="w-5 h-5 text-slate-600 group-hover:text-[#1877F2] fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    <div class="text-left">
                        <span class="block text-[8px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Secondary Link</span>
                        <span class="block text-xs text-white font-black uppercase tracking-wider">Facebook Relay</span>
                    </div>
                </div>
                <div class="w-6 h-6 rounded-full border border-white/5 flex items-center justify-center group-hover:border-[#1877F2] transition">
                    <svg class="w-3 h-3 text-slate-600 group-hover:text-[#1877F2] transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="4" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </button>
        </div>

        <footer class="mt-14 pt-8 border-t border-white/5">
            <div id="loader-area" class="flex flex-col items-center gap-4">
                <div id="status-indicator" class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></div>
                    <span id="status-text" class="text-slate-500 text-[8px] font-black uppercase tracking-[0.6em]">System Standby</span>
                </div>
                <div id="auth-loader" class="hidden"><div class="spinner"></div></div>
            </div>
        </footer>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDne6T2ZmFrqP4idNGNHfp0CipTUxLkXHo",
            authDomain: "prime-store-487ac.firebaseapp.com",
            projectId: "prime-store-487ac",
            storageBucket: "prime-store-487ac.firebasestorage.app",
            messagingSenderId: "312275328003",
            appId: "1:312275328003:web:92459c25dde3fd115c0236"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_ID = "primestore.antmob@gmail.com";

        // Global UI Controls
        const notify = (title, desc, icon = "ℹ️") => {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('notification-box').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('notification-box').style.display = 'none'; };

        const updateUI = (state) => {
            const statusText = document.getElementById('status-text');
            const loader = document.getElementById('auth-loader');
            const btns = document.getElementById('btn-group');

            if(state === 'loading') {
                statusText.innerText = "AUTHENTICATING...";
                loader.classList.remove('hidden');
                btns.style.opacity = '0.3';
                btns.style.pointerEvents = 'none';
            } else {
                statusText.innerText = "SYSTEM STANDBY";
                loader.classList.add('hidden');
                btns.style.opacity = '1';
                btns.style.pointerEvents = 'all';
            }
        };

        // 1. ตรวจสอบสถานะการเข้าสู่ระบบแบบ Real-time
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                updateUI('loading');
                const is_admin = user.email.toLowerCase().trim() === ADMIN_ID.toLowerCase().trim();
                
                // บันทึกข้อมูลลง Database
                try {
                    await setDoc(doc(db, "users", user.uid), {
                        displayName: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        role: is_admin ? "admin" : "member",
                        lastSeen: serverTimestamp()
                    }, { merge: true });

                    localStorage.setItem('user_email', user.email);
                    localStorage.setItem('user_role', is_admin ? "admin" : "member");

                    document.getElementById('status-text').innerText = "ACCESS GRANTED";
                    document.getElementById('status-text').className = is_admin ? "text-yellow-500 font-black tracking-[0.6em]" : "text-emerald-500 font-black tracking-[0.6em]";
                    
                    setTimeout(() => {
                        window.location.href = is_admin ? "admin.html" : "index.html";
                    }, 1000);
                } catch (err) {
                    notify("DATABASE ERROR", "ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาติดต่อแอดมิน", "❌");
                    updateUI('ready');
                }
            }
        });

        // 2. จัดการผลลัพธ์หลังจากเด้งกลับมาจากหน้า Login (Redirect Result)
        getRedirectResult(auth).then((result) => {
            if (result) updateUI('loading');
        }).catch((error) => {
            console.error(error);
            updateUI('ready');
            if(error.code !== 'auth/redirect-cancelled-by-user') {
                notify("AUTH FAILED", "การยืนยันตัวตนล้มเหลว: " + error.code, "⚠️");
            }
        });

        // 3. ฟังก์ชันหลักในการสั่ง Login
        window.executeAuth = (type) => {
            updateUI('loading');
            const provider = type === 'google' ? new GoogleAuthProvider() : new FacebookAuthProvider();
            // บังคับให้เลือกบัญชีทุกครั้งเพื่อความเสถียร
            provider.setCustomParameters({ prompt: 'select_account' });
            signInWithRedirect(auth, provider);
        };
    </script>
</body>
</html>
